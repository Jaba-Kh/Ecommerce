<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ecommerce Website</title>

  <link rel="stylesheet" href="./assests/styles/styles.css">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>

  <header>

    <div class="top-header-wrapper ">
      <div class="top-header-container general-container">

        <div>
          <p>Welcome to worldwide Megamart!</p>
        </div>

        <div class="top-header-link-container">

          <a href="#" class="top-header-link">
            <i class="fa-solid fa-location-dot"></i>
            <span>Deliver to <span class="bold">423651</span></span>
          </a>

          <a href="#" class="top-header-link">
            <i class="fa-regular fa-truck"></i>
            <span>Track your order</span>
          </a>

          <a href="#" class="top-header-link">
            <i class="fa-solid fa-percent"></i>
            <span> All Offers</span>
          </a>

        </div>

      </div>
    </div>

    <div class="middle-header-container general-container">

      <div class="middle-header-left">

        <button>
          <img src="./assests/img/menu.svg">
        </button>

        <div>MegaMart</div>
      </div>

      <div class="middle-header-right flex-items-center">
        <div class="search-container flex-items-center">

          <i class="fa-solid fa-magnifying-glass"></i>
          <input type="search" placeholder="Search essentials, groceries and more...">

          <i class="fa-solid fa-list"></i>
        </div>
        <div class="sign-cart-container flex-items-center">
          <p><i class="fa-regular fa-user"></i> Sign Up/Sign In</p>

          <p><i class="fa-solid fa-cart-arrow-down"></i> Cart</p>
        </div>
      </div>

    </div>


    <div class="bottom-header-container">

      <div class="option-dropdown general-container flex-items-center">

        <div class="menu-option-dropdown flex-items-center">
          <p>Groceries</p>
          <i class="fa-solid fa-check"></i>
        </div>
        <div class="menu-option-dropdown flex-items-center">
          <p>Groceries</p>
          <i class="fa-solid fa-check"></i>
        </div>
        <div class="menu-option-dropdown flex-items-center">
          <p>Groceries</p>
          <i class="fa-solid fa-check"></i>
        </div>
        <div class="menu-option-dropdown flex-items-center">
          <p>Groceries</p>
          <i class="fa-solid fa-check"></i>
        </div>
        <div class="menu-option-dropdown flex-items-center">
          <p>Groceries</p>
          <i class="fa-solid fa-check"></i>
        </div>
        <div class="menu-option-dropdown flex-items-center">
          <p>Groceries</p>
          <i class="fa-solid fa-check"></i>
        </div>
        <div class="menu-option-dropdown flex-items-center">
          <p>Groceries</p>
          <i class="fa-solid fa-check"></i>
        </div>
        <div class="menu-option-dropdown flex-items-center">
          <p>Groceries</p>
          <i class="fa-solid fa-check"></i>
        </div>

      </div>

    </div>


  </header>

  <main class="hero-slider-container general-container">


    <img src="./assests/img/hero.png" alt="">


    <div class="arrow left"><i class="fa-solid fa-angle-left"></i></div>
    <div class="arrow right"><i class="fa-solid fa-angle-right"></i></div>

    <div class="hero-pagination flex-items-center">
      <div class="bullet active"></div>
      <div class="bullet"></div>
      <div class="bullet"></div>
      <div class="bullet"></div>
      <div class="bullet"></div>
      <div class="bullet"></div>
      <div class="bullet"></div>
    </div>

  </main>

  <section></section>

  <footer>
  </footer>

</body>

</html>
